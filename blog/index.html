<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Daftar artikel Isekai Blog berbasis Markdown." />
  <meta property="og:title" content="Blog - Isekai Blog" />
  <meta property="og:description" content="Artikel terbaru dari Isekai Blog." />
  <meta property="og:type" content="website" />
  <title>Blog - Isekai Blog</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="alternate" type="application/rss+xml" title="Isekai Blog RSS" href="../rss.xml" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet" />
</head>
<body>
<header class="site-header"><div class="container nav"><a class="brand" href="../">Isekai Blog</a><nav class="nav-links"><a href="../">Home</a><a href="./">Blog</a><button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode"><i class="fa-solid fa-moon"></i></button></nav></div></header>
<main class="container blog-shell">
  <div class="blog-top"><div><h1>Blog</h1><p class="meta">Artikel otomatis dari file Markdown.</p></div></div>
  <section class="controls">
    <input id="searchInput" type="search" placeholder="Cari artikel..." />
    <select id="categoryFilter"><option value="">Semua Kategori</option></select>
    <select id="tagFilter"><option value="">Semua Tag</option></select>
  </section>
  <section id="postGrid" class="post-grid"></section>
  <div id="emptyState" class="empty" hidden>Artikel tidak ditemukan.</div>
  <nav id="pagination" class="pagination" aria-label="Pagination"></nav>
</main>
<footer class="footer"><div class="container">&copy; 2026 Isekai Blog. All Rights Reserved.</div></footer>
<script src="../assets/js/theme.js"></script>
<script src="../assets/js/blog.js"></script>
</body>
</html>
