name: Build Blog Index

on:
  push:
    branches: [ main, master ]
    paths:
      - 'blog/posts/**.md'
      - 'scripts/build-index.js'
      - 'package.json'
      - '.github/workflows/build-blog.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate posts.json, sitemap.xml, and rss.xml
        run: SITE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" npm run build:index

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto generate blog index, sitemap, and rss"
          file_pattern: blog/posts.json sitemap.xml rss.xml
